name: Keep MongoDB Alive

on:
  schedule:
    - cron: '0 0 */4 * *' # Every 4 days at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Natours API
        run: curl -f https://natours-eight-psi.vercel.app/api/health || exit 1
